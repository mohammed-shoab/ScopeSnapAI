name: Supabase Keep-Alive

# Supabase free tier pauses after 7 days of inactivity.
# This workflow runs every 5 days to ping the database and prevent pausing.

on:
  schedule:
    # Runs every 5 days at 08:00 UTC (well within the 7-day window)
    - cron: '0 8 */5 * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  keepalive:
    name: Ping Supabase DB
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping Supabase REST API
        run: |
          echo "Pinging Supabase to prevent inactivity pause..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "https://quqrvnoguofbjacrxcim.supabase.co/rest/v1/")
          echo "Response status: $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ]; then
            echo "Supabase is alive (HTTP $STATUS)"
          else
            echo "Unexpected status: $STATUS"
            exit 1
          fi

      - name: Log keepalive time
        run: echo "Keep-alive ping sent at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

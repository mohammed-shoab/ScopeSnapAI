name: Export YOLO to ONNX (run manually)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "export" to confirm'
        required: true
        default: ''

jobs:
  export-onnx:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'export'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Modal
        run: pip install modal==0.67.0
      - name: Auth Modal
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: modal token set --token-id "$MODAL_TOKEN_ID" --token-secret "$MODAL_TOKEN_SECRET"
      - name: Create Modal R2 secret
        env:
          CLOUDFLARE_R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_R2_ACCOUNT_ID }}
          CLOUDFLARE_R2_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY }}
          CLOUDFLARE_R2_SECRET_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_KEY }}
          CLOUDFLARE_R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_BUCKET }}
        run: |
          modal secret create snapai-r2-secrets \
            CLOUDFLARE_R2_ACCOUNT_ID="$CLOUDFLARE_R2_ACCOUNT_ID" \
            CLOUDFLARE_R2_ACCESS_KEY="$CLOUDFLARE_R2_ACCESS_KEY" \
            CLOUDFLARE_R2_SECRET_KEY="$CLOUDFLARE_R2_SECRET_KEY" \
            CLOUDFLARE_R2_BUCKET="$CLOUDFLARE_R2_BUCKET" \
            --force 2>/dev/null || true
      - name: Run ONNX export on Modal GPU
        working-directory: scopesnap-api
        run: modal run scripts/export_to_onnx.py
      - name: Trigger Railway redeploy
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"mutation { serviceInstanceRedeploy(serviceId: \"a23d5cad-d8c9-434e-a3dc-89634d8642ab\", environmentId: \"03c478ed-5720-427a-b567-d6bd2ebf3eb1\") }"}' && echo "Done"
